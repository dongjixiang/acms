<!-- 启动菜单 -->
<div id="launcher-menu">
  <div class="launcher-section-title">流程</div>
  <div class="launcher-item" id="launcher-new-project" onclick="openProjectsWindowWithNewForm()" style="background:color-mix(in srgb, var(--accent) 12%, transparent);border:1px solid color-mix(in srgb, var(--accent) 30%, transparent);margin:2px 0">
    <span class="li-icon">✦</span><span class="li-label" style="font-weight:600;color:var(--accent)">新建项目</span>
  </div>
  <div class="divider"></div>
  <div class="launcher-section-title">导航</div>
  <div class="launcher-item" onclick="launchProjects()"><span class="li-icon">📦</span><span class="li-label">项目管理</span></div>
  <div class="launcher-item" onclick="launchAdmin()"><span class="li-icon">⚙️</span><span class="li-label">系统管理</span></div>
  <!-- v0.55：💬 对话 hover 子菜单（新建 + 最近历史 + 打开历史/回收站） -->
  <div class="launcher-item launcher-has-submenu" id="launcher-chat" onmouseenter="onChatLauncherHover()" onmouseleave="onChatLauncherLeave()">
    <span class="li-icon">💬</span><span class="li-label">对话</span><span class="li-arrow">▸</span>
    <div class="launcher-submenu" id="launcher-chat-submenu">
      <div class="launcher-item" onclick="createNewChatWindow()"><span class="li-icon">🆕</span><span class="li-label">新建对话</span></div>
      <div class="divider"></div>
      <div class="launcher-section-title">最近对话</div>
      <div id="launcher-chat-list"><!-- JS 动态填 --></div>
      <div class="divider"></div>
      <div class="launcher-item" onclick="openChatHistoryWindow()"><span class="li-icon">📚</span><span class="li-label">打开历史对话窗口…</span></div>
      <div class="launcher-item" onclick="openChatRecycleBin()">
        <span class="li-icon">🗑</span><span class="li-label">回收站</span>
        <span class="li-badge" id="launcher-recycle-count" style="display:none">0</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="launcher-section-title">工具</div>
  <div class="launcher-item" onclick="launchView('file-manager')"><span class="li-icon">📂</span><span class="li-label">文件浏览器</span></div>
  <div class="launcher-item" onclick="launchView('web-browser')"><span class="li-icon">🌐</span><span class="li-label">浏览器</span></div>
  <!-- v0.59：微信 — 通过「本地应用壳」加载真·微信网页版（绕过 X-Frame / CSP） -->
  <div class="launcher-item" onclick="launchWeChat()" title="打开微信网页版"><span class="li-icon" aria-hidden="true">🟢</span><span class="li-label">微信</span></div>
  <div class="launcher-item" onclick="openTerminal()"><span class="li-icon">💻</span><span class="li-label">终端</span></div>
  <!-- v0.61：辅助工具 — 一句话调起图片/音乐/搜索/文档 -->
  <div class="launcher-item" onclick="launchView('assist-free')"><span class="li-icon">🛠️</span><span class="li-label">辅助工具</span></div>
  <div class="divider"></div>
  <div class="launcher-section-title" id="launcher-proj-title" style="display:none"></div>
  <div id="launcher-proj-apps" style="display:none">
    <div class="launcher-item" onclick="launchView('dashboard')"><span class="li-icon">📊</span><span class="li-label">仪表盘</span></div>
    <div class="launcher-item" onclick="launchView('requirements')"><span class="li-icon">📋</span><span class="li-label">需求管理</span></div>
    <div class="launcher-item" onclick="launchView('kanban')"><span class="li-icon">📌</span><span class="li-label">任务看板</span></div>
    <div class="launcher-item" onclick="launchView('bugs')"><span class="li-icon">🐛</span><span class="li-label">缺陷管理</span></div>
    <div class="launcher-item" onclick="launchView('knowledge')"><span class="li-icon">📚</span><span class="li-label">知识库</span></div>
    <div class="launcher-item" onclick="launchView('delivery')"><span class="li-icon">📦</span><span class="li-label">交付管理</span></div>
    <div class="launcher-item" onclick="launchView('agents')"><span class="li-icon">🤖</span><span class="li-label">智能体协同</span></div>
    <div class="launcher-item" onclick="launchView('reports')"><span class="li-icon">📊</span><span class="li-label">项目报告</span></div>
    <div class="launcher-item" onclick="launchView('settings')"><span class="li-icon">⚙️</span><span class="li-label">项目设置</span></div>
  </div>
  <div class="divider"></div>
  <div class="launcher-item" onclick="doLogout()"><span class="li-icon">🚪</span><span class="li-label">退出登录</span></div>
</div>
