<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>样片跟踪</title><link rel="stylesheet" href="../css/design-tokens.css"><link rel="stylesheet" href="../css/components.css"><style>body{background:var(--color-gray-50);min-height:100vh}.page{padding:24px;max-width:1200px;margin:0 auto}.page h2{font-size:20px;margin:0 0 20px}.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.card h3{font-size:16px;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--color-gray-100)}.kanban{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}.k-col{background:var(--color-gray-50);border-radius:8px;padding:12px;min-height:150px}.k-col h4{font-size:13px;margin:0 0 8px;padding:4px 8px;border-radius:4px;display:flex;justify-content:space-between}.k-card{background:#fff;border-radius:4px;padding:10px;margin-bottom:8px;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.k-card .id{font-weight:600;color:var(--color-primary)}</style></head><body>
<div class="page">
  <h2>🔍 样片跟踪</h2>
  <div class="card"><h3>跟踪看板</h3>
    <div class="kanban">
      <div class="k-col"><h4 style="background:var(--color-warning);color:#fff;">待审批 <span>2</span></h4>
        <div class="k-card"><div class="id">APP-2026001</div>张明 · 华为</div>
        <div class="k-card"><div class="id">APP-2026015</div>李华 · 中国电信</div></div>
      <div class="k-col"><h4 style="background:var(--color-primary);color:#fff;">审批中 <span>2</span></h4>
        <div class="k-card"><div class="id">APP-2026003</div>王芳 · 海康威视</div>
        <div class="k-card"><div class="id">APP-2026012</div>李华 · 京东方</div></div>
      <div class="k-col"><h4 style="background:var(--color-info);color:#fff;">备货中 <span>1</span></h4>
        <div class="k-card"><div class="id">APP-2026009</div>李华 · 美的集团</div></div>
      <div class="k-col"><h4 style="background:var(--color-success);color:#fff;">已发货 <span>2</span></h4>
        <div class="k-card"><div class="id">APP-2026007</div>张明 · 格力电器</div>
        <div class="k-card"><div class="id">APP-2026014</div>王芳 · 海信集团</div></div>
      <div class="k-col"><h4 style="background:var(--color-gray-500);color:#fff;">已签收 <span>1</span></h4>
        <div class="k-card"><div class="id">APP-2026008</div>王芳 · 浪潮信息</div></div>
    </div>
  </div>
  <div style="text-align:right;font-size:12px;color:var(--color-text-secondary);">
    <a href="#" onclick="window.parent.postMessage({type:'navigate',module:'apply'},'*');return false;" style="color:var(--color-primary);">📋 申请样片</a>
    <span style="margin:0 8px;">|</span>
    <a href="#" onclick="window.parent.postMessage({type:'navigate',module:'dashboard'},'*');return false;" style="color:var(--color-primary);">📊 查看数据</a>
    <span style="margin:0 8px;">|</span>
    <a href="#" onclick="window.parent.postMessage({type:'navigate',module:'erp'},'*');return false;" style="color:var(--color-primary);">🔗 ERP库存</a>
  </div>
</div></body></html>
