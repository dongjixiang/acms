<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>数据分析看板</title><link rel="stylesheet" href="../css/design-tokens.css"><link rel="stylesheet" href="../css/components.css"><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><style>body{background:var(--color-gray-50);min-height:100vh}.page{padding:24px;max-width:1200px;margin:0 auto}.page h2{font-size:20px;margin:0 0 20px}.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.card h3{font-size:16px;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--color-gray-100)}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.chart-box{height:250px}.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}.kpi{text-align:center;padding:16px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.kpi .v{font-size:28px;font-weight:700;color:var(--color-primary)}.kpi .l{font-size:12px;color:var(--color-text-secondary)}</style></head><body>
<div class="page">
  <h2>📊 数据分析看板</h2>
  <div class="kpi-grid">
    <div class="kpi"><div class="v">1,248</div><div class="l">申请总数</div></div>
    <div class="kpi"><div class="v" style="color:var(--color-warning)">5</div><div class="l">待审批</div></div>
    <div class="kpi"><div class="v" style="color:var(--color-success)">86.5%</div><div class="l">通过率</div></div>
    <div class="kpi"><div class="v">3.2天</div><div class="l">平均周期</div></div>
  </div>
  <div class="grid-2">
    <div class="card"><h3>申请趋势</h3><div class="chart-box"><canvas id="trendChart"></canvas></div></div>
    <div class="card"><h3>型号占比</h3><div class="chart-box"><canvas id="pieChart"></canvas></div></div>
  </div>
  <div style="text-align:right;font-size:12px;color:var(--color-text-secondary);margin-top:8px;">
    <a href="#" onclick="window.parent.postMessage({type:'navigate',module:'apply'},'*');return false;" style="color:var(--color-primary);">📋 前往样片申请</a>
    <span style="margin:0 8px;">|</span>
    <a href="#" onclick="window.parent.postMessage({type:'navigate',module:'approval'},'*');return false;" style="color:var(--color-primary);">✅ 前往审批管理</a>
  </div>
</div>
<script>
const chartCtx1 = document.getElementById('trendChart').getContext('2d');
new Chart(chartCtx1,{type:'line',data:{labels:['1月','2月','3月','4月','5月'],datasets:[{label:'申请数',data:[98,76,112,105,132],borderColor:'#1890FF',backgroundColor:'rgba(24,144,255,0.1)',fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
const chartCtx2 = document.getElementById('pieChart').getContext('2d');
new Chart(chartCtx2,{type:'pie',data:{labels:['STM32','ESP32','LM358','DS18B20','其他'],datasets:[{data:[186,142,98,84,738],backgroundColor:['#1890FF','#52C41A','#FA8C16','#FF4D4F','#C4C4D4']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}});
</script></body></html>
